[general]
version = 1

[[segment]]

# Small chunks — ROS headers, diagnostics, small control messages.
[[segment.mempool]]
size = 256
count = 200

[[segment.mempool]]
size = 4096
count = 100

# Medium chunks — compressed or thumbnail data.
[[segment.mempool]]
size = 65536
count = 50

# 1 MB chunks — one sensor_msgs/Image at 640×480 BGR8 (921,600 bytes) or
# 640×480 16UC1 depth (614,400 bytes). 64 slots covers 6 streams × queue
# depth 10 with headroom for burst frames.
[[segment.mempool]]
size = 1048576
count = 64

# 4 MB chunks — one cam_sync_msgs/SyncedFrames bundle with 4 color frames
# (~3.7 MB serialised). 16 slots is sufficient at 30 Hz.
[[segment.mempool]]
size = 4194304
count = 16
